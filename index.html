<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Preparation Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <h1>🎯 AI Interview Assistant</h1>
            <p>Practice technical & HR interviews for software developer roles</p>
        </header>

        <!-- Chat window - scrollable container for messages -->
        <main class="chat-container">
            <div id="chat-messages" class="chat-messages">
                <!-- Welcome message - shown when chat is empty -->
                <div id="welcome-screen" class="welcome-screen">
                    <div class="welcome-content">
                        <h2>Ready to practice?</h2>
                        <p>Click "Start Interview" to begin. The AI will ask you interview questions one at a time.</p>
                        <p>After each answer, you'll receive a score, feedback, and the next question.</p>
                        <button id="start-btn" class="start-btn">Start Interview</button>
                    </div>
                </div>
            </div>

            <!-- Input area - fixed at bottom -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="Type your answer here..." rows="1"
                        maxlength="2000"></textarea>
                    <button id="send-btn" class="send-btn" title="Send" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
